<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cool Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Welcome to My Page 👋</h1>
        <p>ลองกดปุ่มดูสิ ✨</p>

        <div class="button-group">
            <button class="btn primary" onclick="showMessage()">Say Hello</button>
            <button class="btn success" onclick="changeColor()">Change Color</button>
            <button class="btn danger" onclick="resetPage()">Reset</button>
        </div>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = "สวัสดี Poobet 🚀";
        }

        function changeColor() {
            document.body.style.backgroundColor = "#1e1e2f";
            document.body.style.color = "white";
        }

        function resetPage() {
            location.reload();
        }
    </script>

</body>
</html>
