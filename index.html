<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>👩🏻‍💻 Poobet Web</h1>
        <p class="subtitle">Modern • Clean • Interactive</p>

        <div class="buttons">
            <button class="btn glow" onclick="showMessage()">✨ Say Hello</button>
            <button class="btn dark" onclick="toggleDark()">🌙 Dark Mode</button>
            <button class="btn reset" onclick="resetPage()">🔄 Reset</button>
        </div>

        <p id="message"></p>
    </div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
        "🚀 Welcome to your deployed website!";
}

function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

function resetPage() {
    location.reload();
}
</script>

</body>
</html>
